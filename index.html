<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Countdown Timer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Background Animation -->

    <div class="background-animation"></div>

    <!-- Navbar -->

    <!-- Navbar -->

<nav class="navbar navbar-dark navbar-custom">

    <div class="container-fluid px-4">

        <a class="navbar-brand fw-bold fs-3" href="#">
            ⏳ Smart Countdown Timer
        </a>

        <!-- Right Buttons -->

        <div class="d-flex gap-2">

            <!-- Fullscreen Button -->

            <button class="btn btn-light theme-btn"
                id="fullscreen-btn">

                <i class="fa-solid fa-expand"></i>

            </button>

            <!-- Theme Button -->

            <button class="btn btn-light theme-btn"
                id="theme-btn">

                🌙

            </button>

        </div>

    </div>

</nav>

    <!-- Main Section -->

    <section class="container py-5">

        <div class="row justify-content-center">

            <div class="col-12 col-sm-10 col-md-8 col-lg-6">

                <div class="card timer-card shadow-lg border-0">

                    <div class="card-body text-center p-4">

                        <h2 class="fw-bold mb-4 text-white">
                            Set Your Timer
                        </h2>

                        <!-- Inputs -->

                        <div class="row g-3 mb-4">

                            <div class="col-6">

                                <input type="number" id="set-hour" class="form-control custom-input" placeholder="Hours"
                                    min="0">

                            </div>

                            <div class="col-6">

                                <input type="number" id="set-min" class="form-control custom-input"
                                    placeholder="Minutes" min="0" max="59">

                            </div>

                        </div>

                        <!-- Preset Buttons -->

                        <div class="preset-buttons mb-4">

                            <button class="btn btn-outline-light preset-btn" data-time="25">
                                25 Min
                            </button>

                            <button class="btn btn-outline-light preset-btn" data-time="5">
                                5 Min
                            </button>

                            <button class="btn btn-outline-light preset-btn" data-time="15">
                                15 Min
                            </button>

                        </div>

                        <!-- Circular Timer -->

                        <div class="circle-wrapper mx-auto mb-4">

                            <svg class="progress-ring" width="260" height="260">

                                <circle class="progress-bg" cx="130" cy="130" r="110"></circle>

                                <circle class="progress-circle" cx="130" cy="130" r="110"></circle>

                            </svg>

                            <div class="timer-display">

                                <span id="hour-ele">00</span>
                                :
                                <span id="min-ele">00</span>
                                :
                                <span id="sec-ele">00</span>

                            </div>

                        </div>

                        <!-- Progress Bar -->

                        <div class="progress mb-4 progress-custom">

                            <div class="progress-bar progress-bar-striped progress-bar-animated" id="progress-bar"
                                style="width:0%"></div>

                        </div>

                        <!-- Music Upload -->

                        <div class="mb-4 text-start text-white">

                            <label class="form-label fw-bold">
                                Upload Alarm Music
                            </label>

                            <input type="file" id="music-upload" class="form-control" accept="audio/*">

                        </div>

                        <!-- Buttons -->

                        <div class="d-grid gap-3 d-md-flex justify-content-center">

                            <button class="btn btn-success custom-btn" id="start-btn">
                                <i class="fa-solid fa-play"></i>
                                Start
                            </button>

                            <button class="btn btn-danger custom-btn" id="stop-btn">
                                <i class="fa-solid fa-pause"></i>
                                Stop
                            </button>

                            <button class="btn btn-warning custom-btn" id="reset-btn">
                                <i class="fa-solid fa-rotate-left"></i>
                                Reset
                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
