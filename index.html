<!DOCTYPE html>
<html lang="en">

<head>

    <title>Stop Watch</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">⏳stop watch</a>
        </div>
    </nav>

    <section class="container-fluid mt-5">

        <div class="row justify-content-center">

            <div class="col-md-4">

                <div class="card shadow">

                    <div class="card-body text-center">

                        <!-- Time Inputs -->
                        <div class="mb-3">

                            <input type="number" id="set-min" class="form-control mb-2" placeholder="Enter Minutes">

                            <input type="number" id="set-sec" class="form-control" placeholder="Enter Seconds">

                        </div>

                        <!-- Timer -->
                        <h1 class="mb-4">

                            <span id="min-ele">00 : </span>
                            <span id="sec-ele">00 : </span>
                            <span id="msec-ele">000</span>

                        </h1>

                        <!-- Buttons -->
                        <button class="btn btn-success" id="start-btn">
                            Start
                        </button>

                        <button class="btn btn-danger" id="stop-btn">
                            Stop
                        </button>

                        <button class="btn btn-warning" id="reset-btn">
                            Reset
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </section>
    <script src="./script.js"></script>
</body>

</html>
