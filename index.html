<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Countdown Timer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f4f4;
            min-height: 100vh;
        }

        .timer-card {
            border-radius: 20px;
        }

        .timer-display {
            font-size: 60px;
            font-weight: bold;
            word-break: break-word;
        }

        .custom-btn {
            min-width: 100px;
        }

        /* Mobile */

        @media(max-width:576px) {

            .timer-display {
                font-size: 38px;
            }

            .btn-group-mobile {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .custom-btn {
                width: 100%;
            }

            .card-body {
                padding: 25px 15px;
            }
        }
    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-dark bg-dark">

        <div class="container-fluid">

            <a class="navbar-brand fw-bold" href="#">

                ⏳ Countdown Timer

            </a>

        </div>

    </nav>

    <!-- Main Section -->

    <section class="container py-5">

        <div class="row justify-content-center">

            <div class="col-12 col-sm-10 col-md-7 col-lg-5">

                <div class="card shadow-lg border-0 timer-card">

                    <div class="card-body text-center">

                        <h3 class="mb-4 fw-bold">
                            Set Timer
                        </h3>

                        <!-- Inputs -->

                        <div class="mb-4">

                            <input type="number" id="set-hour" class="form-control mb-3" placeholder="Enter Hours"
                                min="0">

                            <input type="number" id="set-min" class="form-control" placeholder="Enter Minutes (0-59)"
                                min="0" max="59">

                        </div>

                        <!-- Timer -->

                        <div class="timer-display mb-4">

                            <span id="hour-ele">00</span>
                            :
                            <span id="min-ele">00</span>
                            :
                            <span id="sec-ele">00</span>

                        </div>

                        <!-- Buttons -->

                        <div class="btn-group-mobile">

                            <button class="btn btn-success custom-btn" id="start-btn">

                                Start

                            </button>

                            <button class="btn btn-danger custom-btn" id="stop-btn">

                                Stop

                            </button>

                            <button class="btn btn-warning custom-btn" id="reset-btn">

                                Reset

                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="./script.js">



    </script>

</body>

</html>
