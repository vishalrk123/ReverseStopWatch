<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Countdown Timer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .timer-card {
            width: 100%;
            max-width: 500px;
            border: none;
            border-radius: 30px;
            overflow: hidden;
            background: white;
        }

        .top-section {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            color: white;
            padding: 35px 20px;
            text-align: center;
        }

        .top-section h1 {
            font-size: 34px;
            font-weight: bold;
        }

        .timer-display {
            font-size: 70px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #0d6efd;
        }

        .input-box {
            border-radius: 15px;
            padding: 14px;
        }

        .btn-custom {
            border-radius: 15px;
            padding: 12px;
            font-weight: bold;
        }

        .icon-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            margin-bottom: 15px;
            font-size: 30px;
        }

        @media(max-width:576px) {

            .timer-display {
                font-size: 42px;
            }

            .top-section h1 {
                font-size: 26px;
            }
        }
    </style>

</head>

<body>

    <div class="card shadow-lg timer-card">

        <!-- Header -->

        <div class="top-section">

            <div class="icon-circle">
                <i class="bi bi-stopwatch-fill"></i>
            </div>

            <h1>
                Countdown Timer
            </h1>

        </div>

        <!-- Body -->

        <div class="card-body p-4 p-md-5">

            <!-- Inputs -->

            <div class="row mb-4 g-3">

                <div class="col-12 col-md-6">

                    <input type="number" id="set-hour" class="form-control form-control-lg input-box"
                        placeholder="Enter Hours" min="0">

                </div>

                <div class="col-12 col-md-6">

                    <input type="number" id="set-min" class="form-control form-control-lg input-box"
                        placeholder="Enter Minutes" min="0" max="59">

                </div>

            </div>

            <!-- Timer -->

            <div class="text-center timer-display mb-5">

                <span id="hour-ele">00</span>
                :
                <span id="min-ele">00</span>
                :
                <span id="sec-ele">00</span>

            </div>

            <!-- Buttons -->

            <div class="row g-3">

                <div class="col-12 col-md-4">

                    <button class="btn btn-success btn-lg w-100 btn-custom" id="start-btn">

                        <i class="bi bi-play-fill"></i>
                        Start

                    </button>

                </div>

                <div class="col-12 col-md-4">

                    <button class="btn btn-danger btn-lg w-100 btn-custom" id="stop-btn">

                        <i class="bi bi-pause-fill"></i>
                        Stop

                    </button>

                </div>

                <div class="col-12 col-md-4">

                    <button class="btn btn-warning btn-lg w-100 btn-custom" id="reset-btn">

                        <i class="bi bi-arrow-clockwise"></i>
                        Reset

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
