<!DOCTYPE html>
<html lang="en">

<head>

    <title>Countdown Timer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">
                ⏳ Countdown Timer
            </a>
        </div>
    </nav>

    <section class="container-fluid mt-5">

        <div class="row justify-content-center">

            <div class="col-md-4">

                <div class="card shadow">

                    <div class="card-body text-center">

                        <!-- Inputs -->

                        <div class="mb-3">

                            <input type="number" id="set-hour" class="form-control mb-2" placeholder="Enter Hours"
                                min="0">

                            <input type="number" id="set-min" class="form-control" placeholder="Enter Minutes (0-59)"
                                min="0" max="59">

                        </div>

                        <!-- Timer -->

                        <h1 class="mb-4">

                            <span id="hour-ele">00</span>
                            :
                            <span id="min-ele">00</span>
                            :
                            <span id="sec-ele">00</span>

                        </h1>

                        <!-- Buttons -->

                        <button class="btn btn-success" id="start-btn">
                            Start
                        </button>

                        <button class="btn btn-danger" id="stop-btn">
                            Stop
                        </button>

                        <button class="btn btn-warning" id="reset-btn">
                            Reset
                        </button>

                    </div>

                </div>

            </div>

        </div>

    </section>

    <script src="./script.js">


    </script>

</body>

</html>
