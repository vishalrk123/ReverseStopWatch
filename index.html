<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Countdown Timer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #141e30, #243b55);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .timer-card {
            width: 100%;
            max-width: 520px;
            border: none;
            border-radius: 25px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .top-section {
            text-align: center;
            padding: 35px 20px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
        }

        .top-section h1 {
            font-weight: bold;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            margin-bottom: 15px;
            font-size: 35px;
        }

        .timer-display {
            font-size: 70px;
            font-weight: bold;
            text-align: center;
            margin: 30px 0;
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.7);
        }

        .form-control {
            border-radius: 15px;
            padding: 14px;
            font-size: 18px;
        }

        .btn-custom {
            border-radius: 15px;
            padding: 12px;
            font-weight: bold;
            font-size: 18px;
        }

        .music-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 15px;
        }

        @media(max-width:576px) {

            .timer-display {
                font-size: 42px;
            }

            .btn-custom {
                width: 100%;
                margin-bottom: 10px;
            }
        }
    </style>

</head>

<body>

    <div class="card timer-card">

        <!-- Header -->

        <div class="top-section">

            <div class="icon-circle">
                <i class="bi bi-stopwatch-fill"></i>
            </div>

            <h1>
                Countdown Timer
            </h1>

        </div>

        <!-- Body -->

        <div class="card-body p-4">

            <!-- Inputs -->

            <div class="row g-3 mb-4">

                <div class="col-12 col-md-6">

                    <input type="number" id="set-hour" class="form-control" placeholder="Enter Hours" min="0">

                </div>

                <div class="col-12 col-md-6">

                    <input type="number" id="set-min" class="form-control" placeholder="Enter Minutes" min="0" max="59">

                </div>

            </div>

            <!-- Music -->

            <div class="music-box mb-4 text-center">

                <label class="mb-2 fw-bold">
                    Select Alarm Music
                </label>

                <input type="file" id="music-file" class="form-control" accept="audio/*">

            </div>

            <!-- Timer -->

            <div class="timer-display">

                <span id="hour-ele">00</span>
                :
                <span id="min-ele">00</span>
                :
                <span id="sec-ele">00</span>

            </div>

            <!-- Buttons -->

            <div class="row g-3 mt-3">

                <div class="col-12 col-md-4">

                    <button class="btn btn-success btn-custom w-100" id="start-btn">

                        <i class="bi bi-play-fill"></i>
                        Start

                    </button>

                </div>

                <div class="col-12 col-md-4">

                    <button class="btn btn-danger btn-custom w-100" id="stop-btn">

                        <i class="bi bi-pause-fill"></i>
                        Stop

                    </button>

                </div>

                <div class="col-12 col-md-4">

                    <button class="btn btn-warning btn-custom w-100" id="reset-btn">

                        <i class="bi bi-arrow-repeat"></i>
                        Reset

                    </button>

                </div>

            </div>

        </div>

    </div>


    <script src="./script.js">


    </script>

</body>

</html>
