<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Countdown Timer</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f4f4;
        }

        .timer-card {

            border-radius: 20px;
        }

        .timer-display {

            font-size: 55px;
            font-weight: bold;
        }

        .custom-btn {

            min-width: 90px;
        }

        /* Mobile Responsive */

        @media(max-width:576px) {

            .timer-display {

                font-size: 35px;
            }

            .custom-btn {

                width: 100%;
                margin-bottom: 10px;
            }

            .btn-group-mobile {

                display: flex;
                flex-direction: column;
            }
        }
    </style>

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar navbar-dark bg-dark">

        <div class="container-fluid">

            <a class="navbar-brand fw-bold" href="#">

                ⏳ Countdown Timer

            </a>

        </div>

    </nav>

    <!-- Main Section -->

    <section class="container py-5">

        <div class="row justify-content-center">

            <!-- Responsive Column -->

            <div class="col-12 col-sm-10 col-md-7 col-lg-5">

                <div class="card shadow-lg border-0 timer-card">

                    <div class="card-body p-4 text-center">

                        <h3 class="mb-4 fw-bold">
                            Set Timer
                        </h3>

                        <!-- Inputs -->

                        <div class="mb-4">

                            <input type="number" id="set-hour" class="form-control mb-3" placeholder="Enter Hours"
                                min="0">

                            <input type="number" id="set-min" class="form-control" placeholder="Enter Minutes (0-59)"
                                min="0" max="59">

                        </div>

                        <!-- Timer Display -->

                        <div class="timer-display mb-4">

                            <span id="hour-ele">00</span>
                            :
                            <span id="min-ele">00</span>
                            :
                            <span id="sec-ele">00</span>

                        </div>

                        <!-- Buttons -->

                        <div class="btn-group-mobile">

                            <button class="btn btn-success custom-btn me-2">
                                Start
                            </button>

                            <button class="btn btn-danger custom-btn me-2">
                                Stop
                            </button>

                            <button class="btn btn-warning custom-btn">
                                Reset
                            </button>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
